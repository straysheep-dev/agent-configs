server:
    # 'redirect' answers ALL names in the zone with one record,
    # so <token>.flag.canary.internal still resolves -> sinkhole,
    # and the token-bearing qname lands in the log.
    # https://datatracker.ietf.org/doc/html/rfc5737
    # 198.51.100.0/24 is within the TEST-NET-2 range.
    local-zone: "flag.canary.internal." redirect
    local-data: "flag.canary.internal. IN A IP_PLACEHOLDER"